name: sinclear_beyond
description: "Unsere neue Community-Plattform ist da. Gemeinsam sind wir Sinclear."
publish_to: 'none'
version: 0.7.3+70300   # Format: 0.7.3 -> 70300, 0.7.15 -> 71500, 0.12.1 -> 120100, 14.1.1 -> 14010100

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_dotenv: ^6.0.1
  flutter_map: ^8.3.0
  geolocator: ^14.0.3
  go_router: ^17.3.0
  http: ^1.6.0
  latlong2: ^0.10.1
  shared_preferences: ^2.5.5
  url_launcher: ^6.3.2
  cached_network_image: ^3.4.1
  flutter_cache_manager: ^3.4.1
  image_picker: ^1.2.2
  firebase_core: ^4.11.0
  firebase_messaging: ^16.4.1
  flutter_local_notifications: ^22.0.1
  web: ^1.1.1
  intl: ^0.20.3
  table_calendar: ^3.2.0
  image: ^4.9.1
  package_info_plus: ^10.2.0
  open_file: ^4.0.0
  path_provider: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
